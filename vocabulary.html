<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>生字簿產生器 V5｜穎橙 AI 智慧學習</title>

<style>
body{margin:0;font-family:"Microsoft JhengHei",Arial,sans-serif;background:#f4f7fb;color:#1f2937;}
header{background:linear-gradient(90deg,#2563eb,#f97316);color:white;padding:26px 20px;text-align:center;}
.container{display:flex;gap:20px;padding:20px;}
.panel{background:white;border-radius:14px;padding:22px;box-shadow:0 3px 12px rgba(0,0,0,.08);}
.left{width:390px;}
.right{flex:1;}
label{display:block;margin-top:14px;font-weight:bold;}
textarea,select,input{width:100%;box-sizing:border-box;padding:10px;margin-top:6px;font-size:16px;}
button{width:100%;padding:13px;margin-top:18px;border:none;border-radius:9px;color:white;font-weight:bold;font-size:16px;cursor:pointer;}
.generate{background:#2563eb;}
.print{background:#f97316;}
.note{font-size:14px;color:#6b7280;margin-top:10px;}
.paper{background:#e5e7eb;padding:20px;min-height:650px;overflow:auto;}

.page{
  width:210mm;
  min-height:297mm;
  background:white;
  margin:0 auto 20px auto;
  padding:12mm;
  box-sizing:border-box;
  page-break-after:always;
  display:flex;
  justify-content:center;
  align-items:flex-start;
}

.grid{
  display:grid;
  border-top:1.5px solid #333;
  border-left:1.5px solid #333;
}

.cell{
  border-right:1.5px solid #333;
  border-bottom:1.5px solid #333;
  position:relative;
  display:flex;
  flex-direction:row-reverse;
  box-sizing:border-box;
  background:white;
}

.zhuyinBox{
  width:32%;
  height:100%;
  border-left:1px solid #999;
  writing-mode:vertical-rl;
  text-orientation:upright;
  display:flex;
  align-items:center;
  justify-content:center;
  line-height:1.15;
  box-sizing:border-box;
  color:#111827;
  letter-spacing:1px;
}

.charBox{
  width:68%;
  height:100%;
  position:relative;
  display:flex;
  align-items:center;
  justify-content:center;
  box-sizing:border-box;
  font-family:"標楷體","DFKai-SB","Microsoft JhengHei",serif;
}

.charBox::before{
  content:"";
  position:absolute;
  top:0;
  left:50%;
  height:100%;
  border-left:1px dashed #9ca3af;
}

.charBox::after{
  content:"";
  position:absolute;
  left:0;
  top:50%;
  width:100%;
  border-top:1px dashed #9ca3af;
}

.diagonal1,.diagonal2{
  position:absolute;
  width:120%;
  border-top:1px dashed #cbd5e1;
  top:50%;
  left:-10%;
}
.diagonal1{transform:rotate(45deg);}
.diagonal2{transform:rotate(-45deg);}
.sampleChar{z-index:2;}
.hiddenChar{color:transparent!important;}

.row2{display:flex;gap:10px;align-items:center;}
.row2 input[type="color"]{height:42px;padding:2px;}

@media print{
  header,.left,.right h2{display:none;}
  body{background:white;}
  .container{display:block;padding:0;}
  .right{box-shadow:none;padding:0;}
  .paper{background:white;padding:0;}
  .page{
    width:210mm;
    height:297mm;
    margin:0;
    padding:10mm;
    page-break-after:always;
  }
}
</style>
</head>

<body>

<header>
  <h1>穎橙 AI 智慧學習</h1>
  <p>生字簿產生器 V5｜整段文字＋指定字特別設定</p>
</header>

<div class="container">

<div class="panel left">

<label>輸入整段文字</label>
<textarea id="words" rows="5" placeholder="例如：小明今天到學校上課">小明今天到學校上課</textarea>

<label>表格大小</label>
<select id="gridSize">
  <option value="8">8 × 8</option>
  <option value="10" selected>10 × 10</option>
  <option value="12">12 × 12</option>
</select>

<label>一般文字設定</label>
<select id="normalMode">
  <option value="both" selected>國字＋注音都顯示</option>
  <option value="charOnly">只顯示國字</option>
  <option value="zhuyinOnly">只顯示注音</option>
  <option value="hideChar">隱藏國字，只留注音</option>
  <option value="hideZhuyin">隱藏注音，只留國字</option>
</select>

<label>只顯示注音的字</label>
<input id="zhuyinOnlyChars" placeholder="例如：今、明">

<label>只顯示國字的字</label>
<input id="charOnlyChars" placeholder="例如：校、課">

<label>描寫字</label>
<input id="traceChars" placeholder="例如：學、習">

<label>隱藏國字的字</label>
<input id="hideCharChars" placeholder="例如：天、上">

<label>隱藏注音的字</label>
<input id="hideZhuyinChars" placeholder="例如：小、到">

<label>字體顏色</label>
<div class="row2">
  <input type="color" id="fontColor" value="#111827">
  <input type="text" id="fontColorText" value="#111827">
</div>

<label>描寫透明度</label>
<select id="opacity">
  <option value="1">100%</option>
  <option value="0.75">75%</option>
  <option value="0.5">50%</option>
  <option value="0.25" selected>25%（適合描寫）</option>
  <option value="0.1">10%</option>
</select>

<button class="generate" onclick="generateBook()">產生生字簿</button>
<button class="print" onclick="window.print()">列印／另存 PDF</button>

<p class="note">
V5：可輸入整段文字，預設國字與注音都顯示，也可指定某些字只顯示國字、只顯示注音、描寫或隱藏。
</p>

</div>

<div class="panel right">
<h2>生字簿預覽</h2>
<div id="paper" class="paper">請輸入文字後，按「產生生字簿」。</div>
</div>

</div>

<script>
const zhuyinMap = {
  "小":"ㄒㄧㄠˇ","明":"ㄇㄧㄥˊ","今":"ㄐㄧㄣ","天":"ㄊㄧㄢ",
  "到":"ㄉㄠˋ","學":"ㄒㄩㄝˊ","校":"ㄒㄧㄠˋ","上":"ㄕㄤˋ",
  "課":"ㄎㄜˋ","後":"ㄏㄡˋ","產":"ㄔㄢˇ","出":"ㄔㄨ",
  "表":"ㄅㄧㄠˇ","格":"ㄍㄜˊ","國":"ㄍㄨㄛˊ","語":"ㄩˇ",
  "習":"ㄒㄧˊ","生":"ㄕㄥ","字":"ㄗˋ","地":"ㄉㄧˋ",
  "人":"ㄖㄣˊ","大":"ㄉㄚˋ","中":"ㄓㄨㄥ","山":"ㄕㄢ",
  "水":"ㄕㄨㄟˇ","火":"ㄏㄨㄛˇ","木":"ㄇㄨˋ","金":"ㄐㄧㄣ",
  "土":"ㄊㄨˇ","日":"ㄖˋ","月":"ㄩㄝˋ","我":"ㄨㄛˇ",
  "你":"ㄋㄧˇ","他":"ㄊㄚ","她":"ㄊㄚ","好":"ㄏㄠˇ"
};

function getZhuyin(ch){
  return zhuyinMap[ch] || "";
}

function parseChars(str){
  return str.replace(/[，,、\s]/g,"").split("");
}

document.getElementById("fontColor").addEventListener("input",function(){
  document.getElementById("fontColorText").value=this.value;
  generateBook();
});

document.getElementById("fontColorText").addEventListener("input",function(){
  document.getElementById("fontColor").value=this.value;
  generateBook();
});

function generateBook(){
  const text=document.getElementById("words").value.replace(/\s/g,"");
  const gridSize=Number(document.getElementById("gridSize").value);
  const normalMode=document.getElementById("normalMode").value;
  const fontColor=document.getElementById("fontColorText").value || "#111827";
  const opacity=document.getElementById("opacity").value;

  const zhuyinOnlyChars=parseChars(document.getElementById("zhuyinOnlyChars").value);
  const charOnlyChars=parseChars(document.getElementById("charOnlyChars").value);
  const traceChars=parseChars(document.getElementById("traceChars").value);
  const hideCharChars=parseChars(document.getElementById("hideCharChars").value);
  const hideZhuyinChars=parseChars(document.getElementById("hideZhuyinChars").value);

  if(!text){
    alert("請先輸入文字");
    return;
  }

  let items=[...text].map(ch=>{
    let mode=normalMode;

    if(zhuyinOnlyChars.includes(ch)) mode="zhuyinOnly";
    if(charOnlyChars.includes(ch)) mode="charOnly";
    if(traceChars.includes(ch)) mode="trace";
    if(hideCharChars.includes(ch)) mode="hideChar";
    if(hideZhuyinChars.includes(ch)) mode="hideZhuyin";

    return {char:ch,mode:mode};
  });

  const cellsPerPage=gridSize*gridSize;
  const pages=[];

  for(let i=0;i<items.length;i+=cellsPerPage){
    pages.push(items.slice(i,i+cellsPerPage));
  }

  const cellSize=gridSize===8 ? 22 : gridSize===10 ? 18 : 15;

  let html="";

  pages.forEach(pageItems=>{
    html+=`
      <div class="page">
        <div class="grid"
          style="
            grid-template-columns:repeat(${gridSize}, ${cellSize}mm);
            grid-template-rows:repeat(${gridSize}, ${cellSize}mm);
          ">
    `;

    for(let r=0;r<gridSize;r++){
      for(let c=0;c<gridSize;c++){
        const index=c*gridSize+r;
        const item=pageItems[index];
        html+=createCell(item,cellSize,fontColor,opacity);
      }
    }

    html+=`</div></div>`;
  });

  document.getElementById("paper").innerHTML=html;
}

function createCell(item,cellSize,fontColor,opacity){
  if(!item){item={char:"",mode:"both"};}

  const ch=item.char || "";
  const mode=item.mode;
  let showChar=true;
  let showZhuyin=true;
  let charOpacity=1;

  if(mode==="charOnly"){
    showChar=true;
    showZhuyin=false;
  }

  if(mode==="zhuyinOnly"){
    showChar=false;
    showZhuyin=true;
  }

  if(mode==="hideChar"){
    showChar=false;
    showZhuyin=true;
  }

  if(mode==="hideZhuyin"){
    showChar=true;
    showZhuyin=false;
  }

  if(mode==="trace"){
    showChar=true;
    showZhuyin=true;
    charOpacity=opacity;
  }

  const z=showZhuyin && ch ? getZhuyin(ch) : "";
  const fontSize=cellSize*0.55;
  const displayClass=showChar ? "sampleChar" : "hiddenChar";
  const style=`color:${fontColor};opacity:${charOpacity};`;

  return `
    <div class="cell">
      <div class="zhuyinBox" style="font-size:${cellSize*0.18}mm;">${z}</div>
      <div class="charBox" style="font-size:${fontSize}mm;">
        <div class="diagonal1"></div>
        <div class="diagonal2"></div>
        <span class="${displayClass}" style="${style}">${ch}</span>
      </div>
    </div>
  `;
}

[
"words","gridSize","normalMode","zhuyinOnlyChars","charOnlyChars",
"traceChars","hideCharChars","hideZhuyinChars","opacity"
].forEach(id=>{
  document.getElementById(id).addEventListener("input",generateBook);
  document.getElementById(id).addEventListener("change",generateBook);
});

generateBook();
</script>

</body>
</html>
