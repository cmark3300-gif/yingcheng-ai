<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>生字簿產生器 V2｜穎橙 AI 智慧學習</title>

<style>
body{
  margin:0;
  font-family:"Microsoft JhengHei",Arial,sans-serif;
  background:#f4f7fb;
  color:#1f2937;
}
header{
  background:linear-gradient(90deg,#2563eb,#f97316);
  color:white;
  padding:26px 20px;
  text-align:center;
}
.container{
  display:flex;
  gap:20px;
  padding:20px;
}
.panel{
  background:white;
  border-radius:14px;
  padding:22px;
  box-shadow:0 3px 12px rgba(0,0,0,.08);
}
.left{width:350px;}
.right{flex:1;}
label{
  display:block;
  margin-top:14px;
  font-weight:bold;
}
textarea,select,input{
  width:100%;
  box-sizing:border-box;
  padding:10px;
  margin-top:6px;
  font-size:16px;
}
button{
  width:100%;
  padding:13px;
  margin-top:18px;
  border:none;
  border-radius:9px;
  color:white;
  font-weight:bold;
  font-size:16px;
  cursor:pointer;
}
.generate{background:#2563eb;}
.print{background:#f97316;}
.note{
  font-size:14px;
  color:#6b7280;
  margin-top:10px;
}

/* 預覽紙張 */
.paper{
  background:#e5e7eb;
  padding:20px;
  min-height:650px;
}

/* A4 頁面 */
.page{
  width:210mm;
  min-height:297mm;
  background:white;
  margin:0 auto 20px auto;
  padding:12mm;
  box-sizing:border-box;
  page-break-after:always;
}

/* 固定 10×10 表格 */
.grid{
  display:grid;
  grid-template-columns:repeat(10, 1fr);
  grid-template-rows:repeat(10, 1fr);
  width:100%;
  height:260mm;
  border-top:1.5px solid #333;
  border-left:1.5px solid #333;
}

/* 每一格 */
.cell{
  border-right:1.5px solid #333;
  border-bottom:1.5px solid #333;
  position:relative;
  display:flex;
  flex-direction:row-reverse;
  overflow:hidden;
  box-sizing:border-box;
}

/* 田字格區 */
.charBox{
  flex:1;
  position:relative;
  display:flex;
  align-items:center;
  justify-content:center;
  font-family:"標楷體","DFKai-SB","Microsoft JhengHei",serif;
  font-size:28px;
}

/* 注音欄 */
.zhuyinBox{
  width:18px;
  border-left:1px solid #999;
  font-size:12px;
  writing-mode:vertical-rl;
  text-align:center;
  display:flex;
  align-items:center;
  justify-content:center;
  color:#111827;
}

/* 田字格虛線 */
.charBox::before{
  content:"";
  position:absolute;
  top:0;
  left:50%;
  height:100%;
  border-left:1px dashed #9ca3af;
}
.charBox::after{
  content:"";
  position:absolute;
  left:0;
  top:50%;
  width:100%;
  border-top:1px dashed #9ca3af;
}

.diagonal1,
.diagonal2{
  position:absolute;
  width:120%;
  border-top:1px dashed #cbd5e1;
  top:50%;
  left:-10%;
}
.diagonal1{transform:rotate(45deg);}
.diagonal2{transform:rotate(-45deg);}

.sampleChar{
  z-index:2;
  color:#111827;
}

.blankChar{
  color:transparent;
}

@media print{
  header,.left,.right h2{
    display:none;
  }
  body{
    background:white;
  }
  .container{
    display:block;
    padding:0;
  }
  .right{
    box-shadow:none;
    padding:0;
  }
  .paper{
    background:white;
    padding:0;
  }
  .page{
    margin:0;
    width:210mm;
    height:297mm;
    padding:10mm;
    page-break-after:always;
  }
}
</style>
</head>

<body>

<header>
  <h1>穎橙 AI 智慧學習</h1>
  <p>生字簿產生器 V2｜固定 10×10 表格＋注音欄＋自動分頁</p>
</header>

<div class="container">

<div class="panel left">

<label>輸入生字</label>
<textarea id="words" rows="5" placeholder="例如：後產出PDF">後產出PDF</textarea>

<label>練習模式</label>
<select id="mode">
  <option value="sample">每字第一格顯示範字</option>
  <option value="blank">全部空白格</option>
</select>

<label>是否顯示注音欄</label>
<select id="showZhuyin">
  <option value="yes" selected>顯示</option>
  <option value="no">不顯示</option>
</select>

<button class="generate" onclick="generateBook()">產生生字簿</button>
<button class="print" onclick="window.print()">列印／另存 PDF</button>

<p class="note">
V2：固定 10×10 表格，文字由右上往下填，滿 100 格自動跳下一頁。
</p>

</div>

<div class="panel right">
<h2>生字簿預覽</h2>
<div id="paper" class="paper">
請輸入生字後，按「產生生字簿」。
</div>
</div>

</div>

<script>
const zhuyinMap = {
  "後":"ㄏㄡˋ",
  "產":"ㄔㄢˇ",
  "出":"ㄔㄨ",
  "表":"ㄅㄧㄠˇ",
  "格":"ㄍㄜˊ",
  "國":"ㄍㄨㄛˊ",
  "語":"ㄩˇ",
  "學":"ㄒㄩㄝˊ",
  "習":"ㄒㄧˊ",
  "生":"ㄕㄥ",
  "字":"ㄗˋ"
};

function getZhuyin(ch){
  return zhuyinMap[ch] || "";
}

function generateBook(){
  const text = document.getElementById("words").value.replace(/\s/g,"");
  const mode = document.getElementById("mode").value;
  const showZhuyin = document.getElementById("showZhuyin").value;

  if(!text){
    alert("請先輸入生字");
    return;
  }

  let items = [];

  [...text].forEach(ch=>{
    for(let i=0;i<10;i++){
      items.push({
        char: ch,
        showChar: mode === "sample" && i === 0
      });
    }
  });

  const pages = [];
  for(let i=0;i<items.length;i+=100){
    pages.push(items.slice(i,i+100));
  }

  let html = "";

  pages.forEach(pageItems=>{
    html += `<div class="page"><div class="grid">`;

    for(let pos=0;pos<100;pos++){
      const item = pageItems[pos];

      if(item){
        html += createCell(item.char,item.showChar,showZhuyin);
      }else{
        html += createCell("",false,showZhuyin);
      }
    }

    html += `</div></div>`;
  });

  document.getElementById("paper").innerHTML = html;
}

function createCell(ch,showChar,showZhuyin){
  const z = showZhuyin === "yes" ? getZhuyin(ch) : "";

  return `
    <div class="cell">
      <div class="zhuyinBox">${z}</div>
      <div class="charBox">
        <div class="diagonal1"></div>
        <div class="diagonal2"></div>
        <span class="${showChar ? "sampleChar" : "blankChar"}">${ch}</span>
      </div>
    </div>
  `;
}

generateBook();
</script>

</body>
</html>
