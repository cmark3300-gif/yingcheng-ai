<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>生字簿產生器 V8-A｜穎橙 AI 智慧學習</title>

<style>
body{margin:0;font-family:"Microsoft JhengHei",Arial,sans-serif;background:#f4f7fb;color:#1f2937;}
header{background:linear-gradient(90deg,#2563eb,#f97316);color:white;padding:20px 12px;text-align:center;}
header h1{margin:0;font-size:26px;}
header p{margin:8px 0 0;}

.container{display:flex;gap:16px;padding:16px;}
.panel{background:white;border-radius:14px;padding:18px;box-shadow:0 3px 12px rgba(0,0,0,.08);}
.left{width:390px;}
.right{flex:1;min-width:0;}

label{display:block;margin-top:12px;font-weight:bold;}
textarea,select,input{width:100%;box-sizing:border-box;padding:11px;margin-top:6px;font-size:16px;}
button{width:100%;padding:14px;margin-top:14px;border:none;border-radius:9px;color:white;font-weight:bold;font-size:17px;cursor:pointer;}
.generate{background:#2563eb;}
.blankBtn{background:#0f766e;}
.clearBtn{background:#64748b;}
.print{background:#f97316;}
.note{font-size:14px;color:#6b7280;margin-top:10px;line-height:1.6;}

.paper{background:#e5e7eb;padding:12px;min-height:650px;overflow:auto;}

.page{
  width:210mm;
  height:297mm;
  background:white;
  margin:0 auto 20px auto;
  padding:10mm;
  box-sizing:border-box;
  page-break-after:always;
  display:flex;
  justify-content:center;
  align-items:flex-start;
}

.grid{
  display:grid;
  grid-template-columns:repeat(10, 18mm);
  grid-template-rows:repeat(10, 18mm);
  border-top:1.7px solid #111;
  border-left:1.7px solid #111;
}

.cell{
  border-right:1.7px solid #111;
  border-bottom:1.7px solid #111;
  position:relative;
  display:flex;
  flex-direction:row-reverse;
  box-sizing:border-box;
  background:white;
  cursor:pointer;
  user-select:none;
  -webkit-tap-highlight-color:rgba(37,99,235,.2);
}

.cell:hover{background:#fff7ed;}

.zhuyinBox{
  width:36%;
  height:100%;
  border-left:1.2px solid #111;
  position:relative;
  box-sizing:border-box;
  color:#000;
  font-family:"Microsoft JhengHei",Arial,sans-serif;
  font-weight:700;
}

.zhuyinBase{
  position:absolute;
  top:50%;
  left:42%;
  transform:translate(-50%,-50%);
  writing-mode:vertical-rl;
  text-orientation:upright;
  line-height:1;
  letter-spacing:0;
  white-space:nowrap;
}

.zhuyinTone{
  position:absolute;
  right:2px;
  top:58%;
  transform:translateY(-50%);
  font-size:.85em;
  font-weight:900;
  line-height:1;
}

.charBox{
  width:64%;
  height:100%;
  position:relative;
  display:flex;
  align-items:center;
  justify-content:center;
  box-sizing:border-box;
  font-family:"標楷體","DFKai-SB","BiauKai","KaiTi","Microsoft JhengHei",serif;
}

.charBox::before{
  content:"";
  position:absolute;
  top:0;
  left:50%;
  height:100%;
  border-left:1px dashed #93c5fd;
}

.charBox::after{
  content:"";
  position:absolute;
  left:0;
  top:50%;
  width:100%;
  border-top:1px dashed #93c5fd;
}

.diagonal1,.diagonal2{
  position:absolute;
  width:120%;
  border-top:1px dashed #bfdbfe;
  top:50%;
  left:-10%;
}
.diagonal1{transform:rotate(45deg);}
.diagonal2{transform:rotate(-45deg);}

.sampleChar{z-index:2;}
.hiddenChar{color:transparent!important;}

.statusTag{
  position:absolute;
  left:2px;
  bottom:1px;
  font-size:9px;
  color:#2563eb;
  background:rgba(255,255,255,.85);
  z-index:3;
}

.row2{display:flex;gap:10px;align-items:center;}
.row2 input[type="color"]{height:42px;padding:2px;}

@media screen and (max-width:768px){
  header h1{font-size:22px;}
  .container{display:block;padding:10px;}
  .panel{padding:14px;margin-bottom:12px;}
  .left{width:auto;}
  textarea{min-height:120px;}
  button{font-size:18px;padding:15px;}
  .paper{
    padding:8px;
    overflow:auto;
    -webkit-overflow-scrolling:touch;
  }
  .page{
    margin:0 0 15px 0;
    transform-origin:top left;
  }
  .right h2{font-size:20px;}
  .note{font-size:15px;}
}

@media print{
  header,.left,.right h2,.statusTag{display:none;}
  body{background:white;}
  .container{display:block;padding:0;}
  .right{box-shadow:none;padding:0;}
  .paper{background:white;padding:0;}
  .page{
    width:210mm;
    height:297mm;
    margin:0;
    padding:10mm;
    page-break-after:always;
  }
  .cell:hover{background:white;}
}
</style>
</head>

<body>

<header>
  <h1>穎橙 AI 智慧學習</h1>
  <p>生字簿產生器 V8-A｜10×10固定版＋手機可用＋本機記憶</p>
</header>

<div class="container">

<div class="panel left">

<label>輸入詞語或句子</label>
<textarea id="words" rows="6">黃狗 公雞 經過 奇怪 山羊 鴨子 信用 錯誤 眼睛 仔細</textarea>

<label>預設顯示模式</label>
<select id="defaultMode">
  <option value="both" selected>國字＋注音</option>
  <option value="zhuyinOnly">只顯示注音</option>
  <option value="charOnly">只顯示國字</option>
  <option value="trace">描寫</option>
  <option value="blank">空白</option>
</select>

<label>字體顏色</label>
<div class="row2">
  <input type="color" id="fontColor" value="#111827">
  <input type="text" id="fontColorText" value="#111827">
</div>

<label>描寫透明度</label>
<select id="opacity">
  <option value="1">100%</option>
  <option value="0.75">75%</option>
  <option value="0.5">50%</option>
  <option value="0.25" selected>25%</option>
  <option value="0.1">10%</option>
</select>

<button class="generate" onclick="generateBook()">產生生字簿</button>
<button class="blankBtn" onclick="generateBlankBook()">產生空白 10×10 生字簿</button>
<button class="clearBtn" onclick="clearLocalMemory()">清除本機記憶</button>
<button class="print" onclick="window.print()">列印／另存 PDF</button>

<p class="note">
手機可直接點方格切換：全 → 音 → 字 → 描 → 空。<br>
本頁會自動記住此裝置最後一次內容與方格狀態。不同手機、不同電腦各自保存。<br>
V8-A 先完成版面、空白簿、本機記憶與貼新字錯誤修正。
</p>

</div>

<div class="panel right">
<h2>生字簿預覽</h2>
<div id="paper" class="paper"></div>
</div>

</div>

<script>
const STORAGE_KEY = "yingcheng_vocabulary_v8a";

const zhuyinMap = {
  "黃":"ㄏㄨㄤˊ","狗":"ㄍㄡˇ","公":"ㄍㄨㄥ","雞":"ㄐㄧ",
  "經":"ㄐㄧㄥ","過":"ㄍㄨㄛˋ","奇":"ㄑㄧˊ","怪":"ㄍㄨㄞˋ",
  "山":"ㄕㄢ","羊":"ㄧㄤˊ","鴨":"ㄧㄚ","子":"ㄗˇ",
  "信":"ㄒㄧㄣˋ","用":"ㄩㄥˋ","錯":"ㄘㄨㄛˋ","誤":"ㄨˋ",
  "眼":"ㄧㄢˇ","睛":"ㄐㄧㄥ","仔":"ㄗˇ","細":"ㄒㄧˋ",
  "小":"ㄒㄧㄠˇ","明":"ㄇㄧㄥˊ","今":"ㄐㄧㄣ","天":"ㄊㄧㄢ",
  "到":"ㄉㄠˋ","學":"ㄒㄩㄝˊ","校":"ㄒㄧㄠˋ","上":"ㄕㄤˋ",
  "課":"ㄎㄜˋ","後":"ㄏㄡˋ","產":"ㄔㄢˇ","出":"ㄔㄨ",
  "表":"ㄅㄧㄠˇ","格":"ㄍㄜˊ","國":"ㄍㄨㄛˊ","語":"ㄩˇ",
  "習":"ㄒㄧˊ","生":"ㄕㄥ","字":"ㄗˋ","地":"ㄉㄧˋ",
  "人":"ㄖㄣˊ","大":"ㄉㄚˋ","中":"ㄓㄨㄥ","水":"ㄕㄨㄟˇ",
  "火":"ㄏㄨㄛˇ","木":"ㄇㄨˋ","金":"ㄐㄧㄣ","土":"ㄊㄨˇ",
  "日":"ㄖˋ","月":"ㄩㄝˋ","我":"ㄨㄛˇ","你":"ㄋㄧˇ",
  "他":"ㄊㄚ","她":"ㄊㄚ","好":"ㄏㄠˇ"
};

let cellData = [];

function getZhuyin(ch){
  return zhuyinMap[ch] || "";
}

function cleanText(text){
  return text.replace(/[，,、。！？；：「」『』（）()《》〈〉\n\r\t]/g,"").replace(/\s/g,"");
}

function splitZhuyin(z){
  const toneMarks=["ˊ","ˇ","ˋ","˙"];
  let tone="";
  let base=z || "";

  toneMarks.forEach(t=>{
    if(base.includes(t)){
      tone=t;
      base=base.replace(t,"");
    }
  });

  return {base,tone};
}

function saveLocalMemory(){
  const data = {
    words: document.getElementById("words").value,
    defaultMode: document.getElementById("defaultMode").value,
    fontColor: document.getElementById("fontColorText").value,
    opacity: document.getElementById("opacity").value,
    cellData: cellData
  };
  localStorage.setItem(STORAGE_KEY, JSON.stringify(data));
}

function loadLocalMemory(){
  try{
    const raw = localStorage.getItem(STORAGE_KEY);
    if(!raw) return false;

    const data = JSON.parse(raw);

    if(data.words) document.getElementById("words").value = data.words;
    if(data.defaultMode) document.getElementById("defaultMode").value = data.defaultMode;
    if(data.fontColor){
      document.getElementById("fontColorText").value = data.fontColor;
      document.getElementById("fontColor").value = data.fontColor;
    }
    if(data.opacity) document.getElementById("opacity").value = data.opacity;

    if(Array.isArray(data.cellData)){
      cellData = data.cellData;
      redrawBook();
      return true;
    }
  }catch(e){
    console.warn("本機記憶讀取失敗，已重新產生。", e);
  }
  return false;
}

function clearLocalMemory(){
  if(confirm("確定要清除此裝置的本機記憶嗎？")){
    localStorage.removeItem(STORAGE_KEY);
    cellData = [];
    document.getElementById("words").value = "";
    document.getElementById("paper").innerHTML = "";
  }
}

document.getElementById("fontColor").addEventListener("input",function(){
  document.getElementById("fontColorText").value=this.value;
  redrawBook();
});

document.getElementById("fontColorText").addEventListener("input",function(){
  if(/^#[0-9A-Fa-f]{6}$/.test(this.value)){
    document.getElementById("fontColor").value=this.value;
  }
  redrawBook();
});

function generateBook(){
  const text = cleanText(document.getElementById("words").value);
  const defaultMode = document.getElementById("defaultMode").value;

  cellData = [];

  if(!text){
    alert("請先輸入文字");
    document.getElementById("paper").innerHTML = "";
    saveLocalMemory();
    return;
  }

  cellData = [...text].map(ch=>({
    char:ch,
    zhuyin:getZhuyin(ch),
    mode:defaultMode
  }));

  redrawBook();
}

function generateBlankBook(){
  cellData = [];

  for(let i=0;i<100;i++){
    cellData.push({
      char:"",
      zhuyin:"",
      mode:"blank"
    });
  }

  redrawBook();
}

function redrawBook(){
  const cellsPerPage = 100;
  const pages = [];

  if(cellData.length === 0){
    document.getElementById("paper").innerHTML = "";
    saveLocalMemory();
    return;
  }

  for(let i=0;i<cellData.length;i+=cellsPerPage){
    pages.push(cellData.slice(i,i+cellsPerPage));
  }

  const cellSize = 18;
  let html = "";

  pages.forEach((pageItems,pageIndex)=>{
    html += `
      <div class="page">
        <div class="grid">
    `;

    for(let r=0;r<10;r++){
      for(let c=0;c<10;c++){
        const indexInPage = c*10+r;
        const globalIndex = pageIndex*cellsPerPage+indexInPage;
        const item = pageItems[indexInPage];
        html += createCell(item, cellSize, globalIndex);
      }
    }

    html += `</div></div>`;
  });

  document.getElementById("paper").innerHTML = html;
  saveLocalMemory();
}

function createCell(item,cellSize,index){
  if(!item){
    return emptyCell();
  }

  const fontColor = document.getElementById("fontColorText").value || "#111827";
  const opacity = document.getElementById("opacity").value;

  let showChar = true;
  let showZhuyin = true;
  let charOpacity = 1;
  let tag = "全";

  if(item.mode === "zhuyinOnly"){showChar=false;showZhuyin=true;tag="音";}
  if(item.mode === "charOnly"){showChar=true;showZhuyin=false;tag="字";}
  if(item.mode === "trace"){showChar=true;showZhuyin=true;charOpacity=opacity;tag="描";}
  if(item.mode === "blank"){showChar=false;showZhuyin=false;tag="空";}

  const fontSize = cellSize*0.55;
  const z = showZhuyin ? item.zhuyin : "";
  const zh = splitZhuyin(z);

  return `
    <div class="cell" onclick="toggleCell(${index})">
      <div class="zhuyinBox" style="font-size:${cellSize*0.22}mm;">
        <div class="zhuyinBase">${zh.base}</div>
        <div class="zhuyinTone">${zh.tone}</div>
      </div>
      <div class="charBox" style="font-size:${fontSize}mm;">
        <div class="diagonal1"></div>
        <div class="diagonal2"></div>
        <span class="${showChar ? "sampleChar" : "hiddenChar"}"
              style="color:${fontColor};opacity:${charOpacity};">${item.char}</span>
      </div>
      <div class="statusTag">${tag}</div>
    </div>
  `;
}

function emptyCell(){
  return `
    <div class="cell">
      <div class="zhuyinBox"></div>
      <div class="charBox">
        <div class="diagonal1"></div>
        <div class="diagonal2"></div>
      </div>
    </div>
  `;
}

function toggleCell(index){
  if(!cellData[index]) return;

  const order = ["both","zhuyinOnly","charOnly","trace","blank"];
  const current = cellData[index].mode || "both";
  const next = order[(order.indexOf(current)+1)%order.length];

  cellData[index].mode = next;
  redrawBook();
}

["words","defaultMode","opacity"].forEach(id=>{
  document.getElementById(id).addEventListener("change",function(){
    if(id==="words" || id==="defaultMode"){
      generateBook();
    }else{
      redrawBook();
    }
  });
});

window.addEventListener("beforeunload", saveLocalMemory);

if(!loadLocalMemory()){
  generateBook();
}
</script>

</body>
</html>
