<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>生字簿產生器｜穎橙 AI 智慧學習</title>

<style>
body{
  margin:0;
  font-family:"Microsoft JhengHei",Arial,sans-serif;
  background:#f4f7fb;
  color:#1f2937;
}

header{
  background:linear-gradient(90deg,#2563eb,#f97316);
  color:white;
  padding:28px 20px;
  text-align:center;
}

.container{
  display:flex;
  gap:20px;
  padding:20px;
}

.panel{
  background:white;
  border-radius:14px;
  padding:22px;
  box-shadow:0 3px 12px rgba(0,0,0,.08);
}

.left{width:350px;}
.right{flex:1;}

label{
  display:block;
  margin-top:14px;
  font-weight:bold;
}

textarea,select,input{
  width:100%;
  box-sizing:border-box;
  padding:10px;
  margin-top:6px;
  font-size:16px;
}

button{
  width:100%;
  padding:13px;
  margin-top:18px;
  border:none;
  border-radius:9px;
  color:white;
  font-weight:bold;
  font-size:16px;
  cursor:pointer;
}

.generate{background:#2563eb;}
.print{background:#f97316;}

.paper{
  background:white;
  border:1px solid #ddd;
  padding:20px;
  min-height:650px;
  overflow:auto;
}

/* 生字簿 */
.practiceArea{
  writing-mode:vertical-rl;
  direction:ltr;
  display:flex;
  align-items:flex-start;
  gap:0;
  min-height:620px;
}

.charColumn{
  display:flex;
  flex-direction:column;
  align-items:center;
  margin-left:4px;
}

.cell{
  width:54px;
  height:54px;
  border:1px solid #2563eb;
  position:relative;
  box-sizing:border-box;
  display:flex;
  align-items:center;
  justify-content:center;
  font-size:34px;
  font-family:"標楷體","DFKai-SB","Microsoft JhengHei",serif;
}

/* 田字格虛線 */
.cell::before{
  content:"";
  position:absolute;
  left:50%;
  top:0;
  width:0;
  height:100%;
  border-left:1px dashed #93c5fd;
}

.cell::after{
  content:"";
  position:absolute;
  top:50%;
  left:0;
  width:100%;
  height:0;
  border-top:1px dashed #93c5fd;
}

.diagonal1,
.diagonal2{
  position:absolute;
  width:75px;
  height:0;
  border-top:1px dashed #bfdbfe;
  top:26px;
  left:-10px;
  pointer-events:none;
}

.diagonal1{transform:rotate(45deg);}
.diagonal2{transform:rotate(-45deg);}

.sample{
  color:#111827;
}

.blank{
  color:transparent;
}

.note{
  font-size:14px;
  color:#6b7280;
  margin-top:8px;
}

@media print{
  header,.left,.right h2{
    display:none;
  }

  body{
    background:white;
  }

  .container{
    display:block;
    padding:0;
  }

  .right{
    box-shadow:none;
    padding:0;
  }

  .paper{
    border:none;
    padding:10mm;
  }

  .cell{
    width:52px;
    height:52px;
  }
}
</style>
</head>

<body>

<header>
  <h1>穎橙 AI 智慧學習</h1>
  <p>生字簿產生器 V1</p>
</header>

<div class="container">

<div class="panel left">

<label>輸入生字</label>
<textarea id="words" rows="5" placeholder="例如：後產出PDF">後產出PDF</textarea>

<label>每個字練習格數</label>
<select id="repeat">
  <option value="5">5格</option>
  <option value="8" selected>8格</option>
  <option value="10">10格</option>
  <option value="12">12格</option>
</select>

<label>格子大小</label>
<select id="cellSize">
  <option value="46">小</option>
  <option value="54" selected>中</option>
  <option value="62">大</option>
</select>

<button class="generate" onclick="generateBook()">產生生字簿</button>
<button class="print" onclick="window.print()">列印／另存 PDF</button>

<p class="note">
V1 功能：輸入文字、自動拆字、產生田字格練習簿、列印 PDF。
</p>

</div>

<div class="panel right">
<h2>生字簿預覽</h2>
<div id="paper" class="paper">
請輸入生字後，按「產生生字簿」。
</div>
</div>

</div>

<script>
function generateBook(){
  const text = document.getElementById("words").value.replace(/\s/g,"");
  const repeat = Number(document.getElementById("repeat").value);
  const cellSize = Number(document.getElementById("cellSize").value);

  if(!text){
    alert("請先輸入生字");
    return;
  }

  const chars = [...text];

  let html = `<div class="practiceArea">`;

  chars.forEach(ch=>{
    html += `<div class="charColumn">`;

    for(let i=0;i<repeat+1;i++){
      html += `
        <div class="cell ${i===0 ? "sample" : "blank"}"
             style="width:${cellSize}px;height:${cellSize}px;font-size:${cellSize*0.62}px;">
          <span>${ch}</span>
          <div class="diagonal1" style="width:${cellSize*1.4}px;top:${cellSize/2}px;left:${-cellSize*0.2}px;"></div>
          <div class="diagonal2" style="width:${cellSize*1.4}px;top:${cellSize/2}px;left:${-cellSize*0.2}px;"></div>
        </div>
      `;
    }

    html += `</div>`;
  });

  html += `</div>`;

  document.getElementById("paper").innerHTML = html;
}

generateBook();
</script>

</body>
</html>
