<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>生字簿產生器 V4｜穎橙 AI 智慧學習</title>

<style>
body{margin:0;font-family:"Microsoft JhengHei",Arial,sans-serif;background:#f4f7fb;color:#1f2937;}
header{background:linear-gradient(90deg,#2563eb,#f97316);color:white;padding:26px 20px;text-align:center;}
.container{display:flex;gap:20px;padding:20px;}
.panel{background:white;border-radius:14px;padding:22px;box-shadow:0 3px 12px rgba(0,0,0,.08);}
.left{width:370px;}
.right{flex:1;}
label{display:block;margin-top:14px;font-weight:bold;}
textarea,select,input{width:100%;box-sizing:border-box;padding:10px;margin-top:6px;font-size:16px;}
button{width:100%;padding:13px;margin-top:18px;border:none;border-radius:9px;color:white;font-weight:bold;font-size:16px;cursor:pointer;}
.generate{background:#2563eb;}
.print{background:#f97316;}
.note{font-size:14px;color:#6b7280;margin-top:10px;}
.paper{background:#e5e7eb;padding:20px;min-height:650px;overflow:auto;}

.page{
  width:210mm;
  min-height:297mm;
  background:white;
  margin:0 auto 20px auto;
  padding:12mm;
  box-sizing:border-box;
  page-break-after:always;
  display:flex;
  justify-content:center;
  align-items:flex-start;
}

.grid{
  display:grid;
  border-top:1.5px solid #333;
  border-left:1.5px solid #333;
}

.cell{
  border-right:1.5px solid #333;
  border-bottom:1.5px solid #333;
  position:relative;
  display:flex;
  flex-direction:row-reverse;
  box-sizing:border-box;
  background:white;
}

.zhuyinBox{
  width:30%;
  height:100%;
  border-left:1px solid #999;
  writing-mode:vertical-rl;
  text-orientation:upright;
  display:flex;
  align-items:center;
  justify-content:center;
  line-height:1.15;
  box-sizing:border-box;
  color:#111827;
  letter-spacing:1px;
}

.charBox{
  width:70%;
  height:100%;
  position:relative;
  display:flex;
  align-items:center;
  justify-content:center;
  box-sizing:border-box;
  font-family:"標楷體","DFKai-SB","Microsoft JhengHei",serif;
}

.charBox::before{
  content:"";
  position:absolute;
  top:0;
  left:50%;
  height:100%;
  border-left:1px dashed #9ca3af;
}

.charBox::after{
  content:"";
  position:absolute;
  left:0;
  top:50%;
  width:100%;
  border-top:1px dashed #9ca3af;
}

.diagonal1,.diagonal2{
  position:absolute;
  width:120%;
  border-top:1px dashed #cbd5e1;
  top:50%;
  left:-10%;
}
.diagonal1{transform:rotate(45deg);}
.diagonal2{transform:rotate(-45deg);}

.sampleChar{z-index:2;}
.hiddenChar{color:transparent!important;}

.row2{
  display:flex;
  gap:10px;
  align-items:center;
}
.row2 input[type="color"]{
  height:42px;
  padding:2px;
}

@media print{
  header,.left,.right h2{display:none;}
  body{background:white;}
  .container{display:block;padding:0;}
  .right{box-shadow:none;padding:0;}
  .paper{background:white;padding:0;}
  .page{
    width:210mm;
    height:297mm;
    margin:0;
    padding:10mm;
    page-break-after:always;
  }
}
</style>
</head>

<body>

<header>
  <h1>穎橙 AI 智慧學習</h1>
  <p>生字簿產生器 V4｜注音欄加寬＋描寫功能</p>
</header>

<div class="container">

<div class="panel left">

<label>輸入生字</label>
<textarea id="words" rows="5" placeholder="例如：後產出PDF">後產出PDF</textarea>

<label>表格大小</label>
<select id="gridSize">
  <option value="8">8 × 8</option>
  <option value="10" selected>10 × 10</option>
  <option value="12">12 × 12</option>
</select>

<label>練習模式</label>
<select id="mode">
  <option value="sample" selected>輸入字直接填入表格</option>
  <option value="sampleBlank">每個字後面加 1 格空白</option>
  <option value="repeat">每個字重複練習</option>
</select>

<label>每個字重複格數</label>
<select id="repeatCount">
  <option value="2">2格</option>
  <option value="4" selected>4格</option>
  <option value="6">6格</option>
  <option value="8">8格</option>
  <option value="10">10格</option>
</select>

<label>注音欄</label>
<select id="showZhuyin">
  <option value="yes" selected>顯示</option>
  <option value="no">不顯示</option>
</select>

<label>國字模式</label>
<select id="charMode">
  <option value="show" selected>顯示</option>
  <option value="trace">描紅／描寫</option>
  <option value="hide">隱藏</option>
</select>

<label>字體顏色</label>
<div class="row2">
  <input type="color" id="fontColor" value="#111827">
  <input type="text" id="fontColorText" value="#111827">
</div>

<label>透明度</label>
<select id="opacity">
  <option value="1">100%</option>
  <option value="0.75">75%</option>
  <option value="0.5">50%</option>
  <option value="0.25" selected>25%（適合描寫）</option>
  <option value="0.1">10%</option>
</select>

<button class="generate" onclick="generateBook()">產生生字簿</button>
<button class="print" onclick="window.print()">列印／另存 PDF</button>

<p class="note">
V4：注音欄已加寬，可選擇國字顯示、描寫或隱藏，也可調整字體顏色與透明度。
</p>

</div>

<div class="panel right">
<h2>生字簿預覽</h2>
<div id="paper" class="paper">請輸入生字後，按「產生生字簿」。</div>
</div>

</div>

<script>
const zhuyinMap = {
  "後":"ㄏㄡˋ","產":"ㄔㄢˇ","出":"ㄔㄨ",
  "表":"ㄅㄧㄠˇ","格":"ㄍㄜˊ","國":"ㄍㄨㄛˊ",
  "語":"ㄩˇ","學":"ㄒㄩㄝˊ","習":"ㄒㄧˊ",
  "生":"ㄕㄥ","字":"ㄗˋ","天":"ㄊㄧㄢ",
  "地":"ㄉㄧˋ","人":"ㄖㄣˊ","大":"ㄉㄚˋ",
  "小":"ㄒㄧㄠˇ","中":"ㄓㄨㄥ","山":"ㄕㄢ",
  "水":"ㄕㄨㄟˇ","火":"ㄏㄨㄛˇ","木":"ㄇㄨˋ",
  "金":"ㄐㄧㄣ","土":"ㄊㄨˇ","日":"ㄖˋ",
  "月":"ㄩㄝˋ","我":"ㄨㄛˇ","你":"ㄋㄧˇ",
  "他":"ㄊㄚ","她":"ㄊㄚ","好":"ㄏㄠˇ"
};

function getZhuyin(ch){
  return zhuyinMap[ch] || "";
}

document.getElementById("fontColor").addEventListener("input",function(){
  document.getElementById("fontColorText").value=this.value;
  generateBook();
});

document.getElementById("fontColorText").addEventListener("input",function(){
  document.getElementById("fontColor").value=this.value;
  generateBook();
});

function generateBook(){
  const text=document.getElementById("words").value.replace(/\s/g,"");
  const gridSize=Number(document.getElementById("gridSize").value);
  const mode=document.getElementById("mode").value;
  const repeatCount=Number(document.getElementById("repeatCount").value);
  const showZhuyin=document.getElementById("showZhuyin").value;
  const charMode=document.getElementById("charMode").value;
  const fontColor=document.getElementById("fontColorText").value || "#111827";
  const opacity=document.getElementById("opacity").value;

  if(!text){
    alert("請先輸入生字");
    return;
  }

  let items=[];

  [...text].forEach(ch=>{
    if(mode==="sample"){
      items.push({char:ch});
    }else if(mode==="sampleBlank"){
      items.push({char:ch});
      items.push({char:ch, blank:true});
    }else if(mode==="repeat"){
      for(let i=0;i<repeatCount;i++){
        items.push({char:ch});
      }
    }
  });

  const cellsPerPage=gridSize*gridSize;
  const pages=[];

  for(let i=0;i<items.length;i+=cellsPerPage){
    pages.push(items.slice(i,i+cellsPerPage));
  }

  const cellSize=gridSize===8 ? 22 : gridSize===10 ? 18 : 15;

  let html="";

  pages.forEach(pageItems=>{
    html+=`
      <div class="page">
        <div class="grid"
          style="
            grid-template-columns:repeat(${gridSize}, ${cellSize}mm);
            grid-template-rows:repeat(${gridSize}, ${cellSize}mm);
          ">
    `;

    for(let r=0;r<gridSize;r++){
      for(let c=0;c<gridSize;c++){
        const index=c*gridSize+r;
        const item=pageItems[index];
        html+=createCell(item,showZhuyin,cellSize,charMode,fontColor,opacity);
      }
    }

    html+=`</div></div>`;
  });

  document.getElementById("paper").innerHTML=html;
}

function createCell(item,showZhuyin,cellSize,charMode,fontColor,opacity){
  if(!item){item={char:"",blank:true};}

  const ch=item.char || "";
  const z=showZhuyin==="yes" && ch ? getZhuyin(ch) : "";
  const fontSize=cellSize*0.55;

  let displayClass="sampleChar";
  let style=`color:${fontColor};opacity:${opacity};`;

  if(charMode==="show"){
    style=`color:${fontColor};opacity:1;`;
  }

  if(charMode==="trace"){
    style=`color:${fontColor};opacity:${opacity};`;
  }

  if(charMode==="hide" || item.blank){
    displayClass="hiddenChar";
  }

  return `
    <div class="cell">
      <div class="zhuyinBox" style="font-size:${cellSize*0.18}mm;">${z}</div>
      <div class="charBox" style="font-size:${fontSize}mm;">
        <div class="diagonal1"></div>
        <div class="diagonal2"></div>
        <span class="${displayClass}" style="${style}">${ch}</span>
      </div>
    </div>
  `;
}

["words","gridSize","mode","repeatCount","showZhuyin","charMode","opacity"].forEach(id=>{
  document.getElementById(id).addEventListener("input",generateBook);
  document.getElementById(id).addEventListener("change",generateBook);
});

generateBook();
</script>

</body>
</html>
