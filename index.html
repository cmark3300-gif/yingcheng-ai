<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>穎橙 AI 智慧學習</title>

<style>
body{
  margin:0;
  font-family:"Microsoft JhengHei",Arial,sans-serif;
  background:#f4f7fb;
  color:#1f2937;
}
header{
  background:linear-gradient(90deg,#2563eb,#f97316);
  color:white;
  padding:35px 20px;
  text-align:center;
}
header h1{margin:0;font-size:34px;}
header p{margin-top:10px;font-size:16px;}

.container{
  display:flex;
  gap:20px;
  padding:20px;
}
.panel{
  background:white;
  border-radius:14px;
  padding:22px;
  box-shadow:0 3px 12px rgba(0,0,0,.08);
}
.left{width:330px;}
.right{flex:1;}

label{
  display:block;
  margin-top:14px;
  font-weight:bold;
}
select,input{
  width:100%;
  padding:10px;
  margin-top:6px;
  box-sizing:border-box;
  font-size:15px;
}
button{
  width:100%;
  padding:13px;
  margin-top:18px;
  border:none;
  border-radius:9px;
  color:white;
  font-weight:bold;
  font-size:16px;
  cursor:pointer;
}
.generate{background:#2563eb;}
.print{background:#f97316;}
.answer{background:#16a34a;}

.paper{
  margin-top:15px;
  background:white;
  border:1px solid #ddd;
  padding:28px;
  min-height:650px;
  line-height:1.9;
  font-size:18px;
}
.paper h2{
  text-align:center;
  margin-bottom:8px;
}
.info{
  display:flex;
  justify-content:space-between;
  margin:15px 0 25px;
}
.question{
  margin-bottom:20px;
}
.options{
  margin-left:20px;
}
.answerBox{
  margin-top:25px;
  padding:15px;
  background:#f0fdf4;
  border:1px solid #86efac;
  display:none;
}

@media print{
  header,.left,.right h2,.no-print{
    display:none;
  }
  body{
    background:white;
  }
  .container{
    display:block;
    padding:0;
  }
  .right{
    box-shadow:none;
    padding:0;
  }
  .paper{
    border:none;
    padding:20px;
    font-size:18px;
  }
}
</style>
</head>

<body>

<header>
  <h1>穎橙 AI 智慧學習</h1>
  <p>國小考卷自動生成・素養題練習平台</p>
</header>

<div class="container">

<div class="panel left">
  <label>年級</label>
  <select id="grade">
    <option>一年級</option>
    <option>二年級</option>
    <option selected>三年級</option>
    <option>四年級</option>
    <option>五年級</option>
    <option>六年級</option>
  </select>

  <label>科目</label>
  <select id="subject">
    <option>國語</option>
    <option selected>數學</option>
    <option>自然</option>
    <option>社會</option>
    <option>英文</option>
  </select>

  <label>教材版本</label>
  <select id="version">
    <option>康軒版</option>
    <option>南一版</option>
    <option>翰林版</option>
    <option>自訂題庫</option>
  </select>

  <label>單元</label>
  <select id="unit">
    <option selected>分數</option>
    <option>加減法</option>
    <option>乘法</option>
    <option>除法</option>
    <option>時間</option>
    <option>面積</option>
  </select>

  <label>題型</label>
  <select id="type">
    <option>選擇題</option>
    <option>填充題</option>
    <option>應用題</option>
    <option selected>混合題</option>
  </select>

  <label>難度</label>
  <select id="level">
    <option>簡單</option>
    <option selected>中等</option>
    <option>進階</option>
  </select>

  <label>題數</label>
  <input id="count" type="number" value="8" min="1" max="20">

  <button class="generate" onclick="generatePaper()">產生考卷</button>
  <button class="answer" onclick="toggleAnswer()">顯示／隱藏答案</button>
  <button class="print" onclick="window.print()">列印 PDF</button>
</div>

<div class="panel right">
  <h2>考卷預覽</h2>
  <div id="paper" class="paper">
    請先選擇條件，然後按「產生考卷」。
  </div>
</div>

</div>

<script>
const mathQuestions = [
  {
    q:"媽媽買了一個披薩，哥哥吃了 1/2 個，妹妹吃了 1/4 個。兩人一共吃了多少個披薩？",
    o:["① 2/6","② 3/4","③ 1/6","④ 1/8"],
    a:"②"
  },
  {
    q:"小宇有一條彩帶，先用掉 1/3 條，又用掉 1/3 條。小宇一共用掉幾條彩帶？",
    o:["① 1/6","② 2/3","③ 3/3","④ 1/9"],
    a:"②"
  },
  {
    q:"老師把一張色紙平均分成 4 份，小美拿了其中 3 份。小美拿了這張色紙的幾分之幾？",
    o:["① 1/4","② 2/4","③ 3/4","④ 4/3"],
    a:"③"
  },
  {
    q:"爸爸買了 8 顆橘子，平均分給 4 個小朋友，每人可以分到幾顆？",
    o:["① 2 顆","② 3 顆","③ 4 顆","④ 12 顆"],
    a:"①"
  },
  {
    q:"小明每天閱讀 15 分鐘，連續閱讀 4 天。小明一共閱讀了幾分鐘？",
    o:["① 19 分鐘","② 45 分鐘","③ 60 分鐘","④ 75 分鐘"],
    a:"③"
  },
  {
    q:"文具店一枝鉛筆 6 元，小安買了 5 枝。他需要付多少元？",
    o:["① 11 元","② 25 元","③ 30 元","④ 35 元"],
    a:"③"
  },
  {
    q:"一盒餅乾有 24 片，平均分給 6 位同學，每位同學可以分到幾片？",
    o:["① 3 片","② 4 片","③ 5 片","④ 6 片"],
    a:"②"
  },
  {
    q:"小華從下午 2 時開始寫功課，寫了 40 分鐘。他幾點幾分寫完？",
    o:["① 2 時20分","② 2時40分","③ 3時00分","④ 3時40分"],
    a:"②"
  },
  {
    q:"一個長方形花圃長 6 公尺、寬 3 公尺，面積是多少平方公尺？",
    o:["① 9 平方公尺","② 12 平方公尺","③ 18 平方公尺","④ 36 平方公尺"],
    a:"③"
  },
  {
    q:"小婷有 50 元，買一本 32 元的筆記本，還剩下多少元？",
    o:["① 12 元","② 18 元","③ 22 元","④ 82 元"],
    a:"②"
  }
];

function generatePaper(){
  const grade = document.getElementById("grade").value;
  const subject = document.getElementById("subject").value;
  const version = document.getElementById("version").value;
  const unit = document.getElementById("unit").value;
  const type = document.getElementById("type").value;
  const level = document.getElementById("level").value;
  const count = Number(document.getElementById("count").value);

  let questions = mathQuestions.slice(0,count);
  let answerText = "";

  let html = `
    <h2>${grade}${subject}測驗卷</h2>
    <div style="text-align:center;">${version}｜${unit}｜${type}｜${level}</div>
    <div class="info">
      <span>姓名：__________</span>
      <span>班級：__________</span>
      <span>座號：__________</span>
    </div>
    <b>一、選擇題</b>
  `;

  questions.forEach((item,index)=>{
    html += `
      <div class="question">
        <p>${index+1}. ${item.q}</p>
        <div class="options">${item.o.join("<br>")}</div>
      </div>
    `;
    answerText += `${index+1}. ${item.a}　`;
  });

  html += `
    <div id="answerBox" class="answerBox">
      <b>答案：</b><br>${answerText}
    </div>
  `;

  document.getElementById("paper").innerHTML = html;
}

function toggleAnswer(){
  const box = document.getElementById("answerBox");
  if(!box){
    alert("請先產生考卷");
    return;
  }
  box.style.display = box.style.display === "block" ? "none" : "block";
}
</script>

</body>
</html>
