<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>穎橙 AI 智慧學習</title>

<style>
body{
  margin:0;
  font-family:"Microsoft JhengHei",Arial,sans-serif;
  background:#f4f7fb;
  color:#1f2937;
}
header{
  background:linear-gradient(90deg,#2563eb,#f97316);
  color:white;
  padding:32px 20px;
  text-align:center;
}
.container{
  display:flex;
  gap:20px;
  padding:20px;
}
.panel{
  background:white;
  border-radius:14px;
  padding:22px;
  box-shadow:0 3px 12px rgba(0,0,0,.08);
}
.left{width:340px;}
.right{flex:1;}
label{
  display:block;
  margin-top:14px;
  font-weight:bold;
}
select,input{
  width:100%;
  padding:10px;
  margin-top:6px;
  font-size:15px;
  box-sizing:border-box;
}
button{
  width:100%;
  padding:13px;
  margin-top:18px;
  border:none;
  border-radius:9px;
  color:white;
  font-weight:bold;
  font-size:16px;
  cursor:pointer;
}
.generate{background:#2563eb;}
.answer{background:#16a34a;}
.print{background:#f97316;}

.paper{
  margin-top:15px;
  background:white;
  border:1px solid #ddd;
  padding:28px;
  min-height:650px;
  line-height:1.9;
  font-size:18px;
}
.paper h2{
  text-align:center;
}
.info{
  display:flex;
  justify-content:space-between;
  margin:18px 0 25px;
}
.question{
  margin-bottom:20px;
}
.options{
  margin-left:20px;
}
.answerBox{
  margin-top:25px;
  padding:15px;
  background:#f0fdf4;
  border:1px solid #86efac;
  display:none;
}

@media print{
  header,.left,.right h2{
    display:none;
  }
  body{background:white;}
  .container{
    display:block;
    padding:0;
  }
  .right{
    box-shadow:none;
    padding:0;
  }
  .paper{
    border:none;
    padding:20px;
  }
}
</style>
</head>

<body>

<header>
  <h1>穎橙 AI 智慧學習</h1>
  <p>國小考卷自動生成・單元式素養題練習平台</p>
</header>

<div class="container">

<div class="panel left">

<label>年級</label>
<select id="grade" onchange="updateUnits()">
  <option>一年級</option>
  <option selected>二年級</option>
  <option>三年級</option>
  <option>四年級</option>
  <option>五年級</option>
  <option>六年級</option>
</select>

<label>科目</label>
<select id="subject" onchange="updateUnits()">
  <option>國語</option>
  <option selected>數學</option>
  <option>自然</option>
  <option>社會</option>
  <option>英文</option>
</select>

<label>教材版本</label>
<select id="version">
  <option>康軒版</option>
  <option>南一版</option>
  <option>翰林版</option>
  <option>自訂題庫</option>
</select>

<label>學期</label>
<select id="semester" onchange="updateUnits()">
  <option selected>上學期</option>
  <option>下學期</option>
</select>

<label>單元</label>
<select id="unit"></select>

<label>題型</label>
<select id="type">
  <option>選擇題</option>
  <option>填充題</option>
  <option>應用題</option>
  <option selected>混合題</option>
</select>

<label>難度</label>
<select id="level">
  <option>簡單</option>
  <option selected>中等</option>
  <option>進階</option>
</select>

<label>題數</label>
<input id="count" type="number" value="8" min="1" max="20">

<button class="generate" onclick="generatePaper()">產生考卷</button>
<button class="answer" onclick="toggleAnswer()">顯示／隱藏答案</button>
<button class="print" onclick="window.print()">列印 PDF</button>

</div>

<div class="panel right">
  <h2>考卷預覽</h2>
  <div id="paper" class="paper">
    請先選擇年級、科目、學期與單元，再按「產生考卷」。
  </div>
</div>

</div>

<script>
const units = {
  "二年級-數學-上學期":[
    "第1單元 2位數的加減",
    "第2單元 2步驟的加減",
    "第3單元 分分看",
    "第4單元 認識公分",
    "第5單元 乘法初步"
  ],
  "二年級-數學-下學期":[
    "第1單元 1000以內的數",
    "第2單元 加減應用",
    "第3單元 分裝與平分",
    "第4單元 公尺和公分",
    "第5單元 乘法"
  ],
  "三年級-數學-上學期":[
    "第1單元 乘法",
    "第2單元 除法",
    "第3單元 時間",
    "第4單元 分數",
    "第5單元 圓"
  ],
  "三年級-數學-下學期":[
    "第1單元 大數",
    "第2單元 公斤和公克",
    "第3單元 分數加減",
    "第4單元 面積",
    "第5單元 小數"
  ],
  "一年級-國語-上學期":[
    "第1單元 注音符號",
    "第2單元 國字認讀",
    "第3單元 詞語練習"
  ],
  "二年級-國語-上學期":[
    "第1單元 生字",
    "第2單元 造詞",
    "第3單元 閱讀理解"
  ]
};

const questionBank = {
  "第1單元 2位數的加減":[
    ["小明有 35 元，媽媽又給他 24 元。現在小明一共有多少元？",["① 49元","② 59元","③ 69元","④ 79元"],"②"],
    ["小美有 68 顆貼紙，送給同學 25 顆後，還剩下幾顆？",["① 33顆","② 43顆","③ 53顆","④ 63顆"],"②"],
    ["哥哥有 47 張卡片，弟弟有 32 張卡片，兩人合起來有幾張？",["① 69張","② 79張","③ 89張","④ 99張"],"②"],
    ["書架上有 56 本書，借出了 21 本，書架上還有幾本？",["① 25本","② 35本","③ 45本","④ 55本"],"②"]
  ],
  "第2單元 2步驟的加減":[
    ["小華有 30 元，爸爸給他 20 元，他又買了 15 元的橡皮擦。小華還剩多少元？",["① 25元","② 35元","③ 45元","④ 50元"],"②"],
    ["教室裡原有 28 人，又進來 12 人，後來有 9 人離開。現在教室有幾人？",["① 21人","② 31人","③ 41人","④ 49人"],"②"],
    ["水果店有 45 顆蘋果，上午賣出 18 顆，下午又進貨 20 顆。現在有幾顆？",["① 37顆","② 47顆","③ 57顆","④ 67顆"],"②"]
  ],
  "第3單元 分分看":[
    ["老師有 12 顆糖果，要平均分給 4 位小朋友，每人可以分到幾顆？",["① 2顆","② 3顆","③ 4顆","④ 6顆"],"②"],
    ["媽媽買了 15 顆橘子，每 5 顆裝成一袋，可以裝成幾袋？",["① 2袋","② 3袋","③ 4袋","④ 5袋"],"②"],
    ["有 18 枝鉛筆，平均分給 6 位同學，每人可以分到幾枝？",["① 2枝","② 3枝","③ 4枝","④ 6枝"],"②"]
  ]
};

function updateUnits(){
  const grade = document.getElementById("grade").value;
  const subject = document.getElementById("subject").value;
  const semester = document.getElementById("semester").value;
  const key = grade + "-" + subject + "-" + semester;
  const unitSelect = document.getElementById("unit");

  unitSelect.innerHTML = "";

  let list = units[key] || ["尚未建立此年級科目的單元"];

  list.forEach(u=>{
    let option = document.createElement("option");
    option.textContent = u;
    unitSelect.appendChild(option);
  });
}

function generatePaper(){
  const grade = document.getElementById("grade").value;
  const subject = document.getElementById("subject").value;
  const version = document.getElementById("version").value;
  const semester = document.getElementById("semester").value;
  const unit = document.getElementById("unit").value;
  const type = document.getElementById("type").value;
  const level = document.getElementById("level").value;
  const count = Number(document.getElementById("count").value);

  let questions = questionBank[unit];

  if(!questions){
    document.getElementById("paper").innerHTML =
    `<h2>${grade}${subject}測驗卷</h2>
     <p>目前「${unit}」尚未建立題庫。</p>
     <p>請先選擇二年級數學的「第1單元、第2單元、第3單元」測試。</p>`;
    return;
  }

  let html = `
    <h2>${grade}${subject}測驗卷</h2>
    <div style="text-align:center;">
      ${version}｜${semester}｜${unit}｜${type}｜${level}
    </div>

    <div class="info">
      <span>姓名：__________</span>
      <span>班級：__________</span>
      <span>座號：__________</span>
    </div>

    <b>一、選擇題</b>
  `;

  let answerText = "";

  for(let i=0;i<count;i++){
    let q = questions[i % questions.length];

    html += `
      <div class="question">
        <p>${i+1}. ${q[0]}</p>
        <div class="options">${q[1].join("<br>")}</div>
      </div>
    `;

    answerText += `${i+1}. ${q[2]}　`;
  }

  html += `
    <div id="answerBox" class="answerBox">
      <b>答案：</b><br>${answerText}
    </div>
  `;

  document.getElementById("paper").innerHTML = html;
}

function toggleAnswer(){
  const box = document.getElementById("answerBox");
  if(!box){
    alert("請先產生考卷");
    return;
  }
  box.style.display = box.style.display === "block" ? "none" : "block";
}

updateUnits();
</script>

</body>
</html>
