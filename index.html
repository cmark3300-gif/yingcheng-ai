<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>穎橙 AI 智慧學習</title>

<style>
body{margin:0;font-family:"Microsoft JhengHei",Arial,sans-serif;background:#f4f7fb;color:#1f2937;}
header{background:linear-gradient(90deg,#2563eb,#f97316);color:white;padding:30px 20px;text-align:center;}
.container{display:flex;gap:20px;padding:20px;}
.panel{background:white;border-radius:14px;padding:22px;box-shadow:0 3px 12px rgba(0,0,0,.08);}
.left{width:360px;}
.right{flex:1;}
label{display:block;margin-top:14px;font-weight:bold;}
select,input{width:100%;padding:10px;margin-top:6px;font-size:15px;box-sizing:border-box;}
.checkboxBox{background:#f8fafc;border:1px solid #ddd;padding:10px;margin-top:8px;border-radius:8px;}
.checkboxBox label{font-weight:normal;margin:8px 0;}
.checkboxBox input{width:auto;margin-right:6px;}
button{width:100%;padding:13px;margin-top:18px;border:none;border-radius:9px;color:white;font-weight:bold;font-size:16px;cursor:pointer;}
.generate{background:#2563eb;}
.answer{background:#16a34a;}
.print{background:#f97316;}
.paper{margin-top:15px;background:white;border:1px solid #ddd;padding:28px;min-height:650px;line-height:1.9;font-size:18px;}
.paper h2{text-align:center;}
.info{display:flex;justify-content:space-between;margin:18px 0 25px;}
.question{margin-bottom:22px;}
.options{margin-left:20px;}
.answerBox{margin-top:25px;padding:15px;background:#f0fdf4;border:1px solid #86efac;display:none;}

@media print{
  header,.left,.right h2{display:none;}
  body{background:white;}
  .container{display:block;padding:0;}
  .right{box-shadow:none;padding:0;}
  .paper{border:none;padding:20px;}
}
</style>
</head>

<body>

<header>
  <h1>穎橙 AI 智慧學習</h1>
  <p>國小考卷自動生成・多單元混合出題平台</p>
</header>

<div class="container">

<div class="panel left">

<label>年級</label>
<select id="grade" onchange="updateUnits()">
  <option>一年級</option>
  <option selected>二年級</option>
  <option>三年級</option>
  <option>四年級</option>
  <option>五年級</option>
  <option>六年級</option>
</select>

<label>科目</label>
<select id="subject" onchange="updateUnits()">
  <option>國語</option>
  <option selected>數學</option>
  <option>自然</option>
  <option>社會</option>
  <option>英文</option>
</select>

<label>教材版本</label>
<select id="version">
  <option>康軒版</option>
  <option>南一版</option>
  <option>翰林版</option>
  <option>自訂題庫</option>
</select>

<label>學期</label>
<select id="semester" onchange="updateUnits()">
  <option selected>上學期</option>
  <option>下學期</option>
</select>

<label>單元（可複選）</label>
<div id="unitBox" class="checkboxBox"></div>

<label>題型（可複選）</label>
<div class="checkboxBox">
  <label><input type="checkbox" name="qtype" value="選擇題" checked>選擇題</label>
  <label><input type="checkbox" name="qtype" value="填充題" checked>填充題</label>
  <label><input type="checkbox" name="qtype" value="應用題" checked>應用題</label>
</div>

<label>難度</label>
<select id="level">
  <option>簡單</option>
  <option selected>中等</option>
  <option>進階</option>
</select>

<label>題數</label>
<input id="count" type="number" value="10" min="1" max="30">

<button class="generate" onclick="generatePaper()">產生考卷</button>
<button class="answer" onclick="toggleAnswer()">顯示／隱藏答案</button>
<button class="print" onclick="window.print()">列印 PDF</button>

</div>

<div class="panel right">
  <h2>考卷預覽</h2>
  <div id="paper" class="paper">
    請選擇年級、科目、學期、單元與題型，再按「產生考卷」。
  </div>
</div>

</div>

<script>
const units = {
  "二年級-數學-上學期":[
    "第1單元 2位數的加減",
    "第2單元 2步驟的加減",
    "第3單元 分分看",
    "第4單元 認識公分",
    "第5單元 乘法初步"
  ],
  "二年級-數學-下學期":[
    "第1單元 1000以內的數",
    "第2單元 加減應用",
    "第3單元 分裝與平分",
    "第4單元 公尺和公分",
    "第5單元 乘法"
  ],
  "三年級-數學-上學期":[
    "第1單元 乘法",
    "第2單元 除法",
    "第3單元 時間",
    "第4單元 分數",
    "第5單元 圓"
  ],
  "三年級-數學-下學期":[
    "第1單元 大數",
    "第2單元 公斤和公克",
    "第3單元 分數加減",
    "第4單元 面積",
    "第5單元 小數"
  ]
};

const questionBank = [
  {
    unit:"第1單元 2位數的加減",
    type:"選擇題",
    q:"小明有 35 元，媽媽又給他 24 元。現在小明一共有多少元？",
    options:["① 49元","② 59元","③ 69元","④ 79元"],
    answer:"②"
  },
  {
    unit:"第1單元 2位數的加減",
    type:"填充題",
    q:"小美有 68 顆貼紙，送給同學 25 顆後，還剩下 ______ 顆。",
    answer:"43"
  },
  {
    unit:"第1單元 2位數的加減",
    type:"應用題",
    q:"哥哥有 47 張卡片，弟弟有 32 張卡片。請問兩人合起來有幾張卡片？",
    answer:"79張"
  },
  {
    unit:"第2單元 2步驟的加減",
    type:"選擇題",
    q:"小華有 30 元，爸爸給他 20 元，他又買了 15 元的橡皮擦。小華還剩多少元？",
    options:["① 25元","② 35元","③ 45元","④ 50元"],
    answer:"②"
  },
  {
    unit:"第2單元 2步驟的加減",
    type:"填充題",
    q:"教室裡原有 28 人，又進來 12 人，後來有 9 人離開。現在教室有 ______ 人。",
    answer:"31"
  },
  {
    unit:"第2單元 2步驟的加減",
    type:"應用題",
    q:"水果店有 45 顆蘋果，上午賣出 18 顆，下午又進貨 20 顆。現在水果店有幾顆蘋果？",
    answer:"47顆"
  },
  {
    unit:"第3單元 分分看",
    type:"選擇題",
    q:"老師有 12 顆糖果，要平均分給 4 位小朋友，每人可以分到幾顆？",
    options:["① 2顆","② 3顆","③ 4顆","④ 6顆"],
    answer:"②"
  },
  {
    unit:"第3單元 分分看",
    type:"填充題",
    q:"媽媽買了 15 顆橘子，每 5 顆裝成一袋，可以裝成 ______ 袋。",
    answer:"3"
  },
  {
    unit:"第3單元 分分看",
    type:"應用題",
    q:"有 18 枝鉛筆，要平均分給 6 位同學。每位同學可以分到幾枝鉛筆？",
    answer:"3枝"
  }
];

function updateUnits(){
  const grade=document.getElementById("grade").value;
  const subject=document.getElementById("subject").value;
  const semester=document.getElementById("semester").value;
  const key=grade+"-"+subject+"-"+semester;
  const box=document.getElementById("unitBox");

  box.innerHTML="";

  const list=units[key] || ["尚未建立此年級科目的單元"];

  list.forEach((u,index)=>{
    box.innerHTML += `
      <label>
        <input type="checkbox" name="unit" value="${u}" ${index<3 ? "checked" : ""}>
        ${u}
      </label>
    `;
  });
}

function getCheckedValues(name){
  return Array.from(document.querySelectorAll(`input[name="${name}"]:checked`)).map(x=>x.value);
}

function generatePaper(){
  const grade=document.getElementById("grade").value;
  const subject=document.getElementById("subject").value;
  const version=document.getElementById("version").value;
  const semester=document.getElementById("semester").value;
  const level=document.getElementById("level").value;
  const count=Number(document.getElementById("count").value);

  const selectedUnits=getCheckedValues("unit");
  const selectedTypes=getCheckedValues("qtype");

  if(selectedUnits.length===0){
    alert("請至少選擇一個單元");
    return;
  }

  if(selectedTypes.length===0){
    alert("請至少選擇一種題型");
    return;
  }

  let questions=questionBank.filter(q =>
    selectedUnits.includes(q.unit) && selectedTypes.includes(q.type)
  );

  if(questions.length===0){
    document.getElementById("paper").innerHTML =
    `<h2>${grade}${subject}測驗卷</h2>
     <p>目前選擇的單元與題型尚未建立題庫。</p>
     <p>請先測試：二年級／數學／上學期／第1至第3單元。</p>`;
    return;
  }

  let html=`
    <h2>${grade}${subject}測驗卷</h2>
    <div style="text-align:center;">
      ${version}｜${semester}｜${level}
    </div>
    <div style="text-align:center;font-size:15px;">
      範圍：${selectedUnits.join("、")}
    </div>

    <div class="info">
      <span>姓名：__________</span>
      <span>班級：__________</span>
      <span>座號：__________</span>
    </div>
  `;

  let answerText="";

  for(let i=0;i<count;i++){
    let q=questions[i % questions.length];

    html += `<div class="question">
      <p>${i+1}.【${q.type}】${q.q}</p>`;

    if(q.options){
      html += `<div class="options">${q.options.join("<br>")}</div>`;
    }

    html += `</div>`;

    answerText += `${i+1}. ${q.answer}　`;
  }

  html += `
    <div id="answerBox" class="answerBox">
      <b>答案：</b><br>${answerText}
    </div>
  `;

  document.getElementById("paper").innerHTML=html;
}

function toggleAnswer(){
  const box=document.getElementById("answerBox");
  if(!box){
    alert("請先產生考卷");
    return;
  }
  box.style.display = box.style.display==="block" ? "none" : "block";
}

updateUnits();
</script>

</body>
</html>
